<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>মুক্তলিপি অ্যাপ স্টোর</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #202124;
            --text-secondary: #5f6368;
            --primary-color: #01875f; /* Play Store Green */
            --accent-color: #e8f5e9;
            --border-color: #e0e0e0;
            --card-bg: #ffffff;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            
            /* Navigation Bar Colors */
            --nav-primary: #1877f2;
            --nav-gradient: linear-gradient(135deg, #1877f2 0%, #00c6ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: 1px solid rgba(255, 255, 255, 0.8);
            
            font-family: 'Hind Siliguri', sans-serif;
        }

        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); user-select: none; -webkit-tap-highlight-color: transparent; padding-bottom: 100px; overflow-x: hidden; }

        /* Top Header */
        .app-header { position: sticky; top: 0; background: var(--card-bg); padding: 12px 15px; box-shadow: var(--shadow-sm); z-index: 100; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; font-size: 20px; color: var(--text-color); cursor: pointer; padding: 5px; }
        .store-title { font-size: 20px; font-weight: 700; margin: 0; color: var(--text-color); }
        .profile-icon { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); }

        /* Search Box */
        .search-container { padding: 15px; background: var(--card-bg); }
        .search-box { background: var(--bg-color); border-radius: 12px; padding: 12px 15px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border-color); transition: 0.3s; }
        .search-box:focus-within { border-color: var(--primary-color); box-shadow: 0 0 0 3px var(--accent-color); }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 15px; font-family: inherit; }

        /* Section Global */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 15px 10px; }
        .section-title { font-size: 18px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px; }
        
        /* App Card (Horizontal) */
        .app-list-horizontal { display: flex; gap: 15px; padding: 5px 15px 15px; overflow-x: auto; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .app-list-horizontal::-webkit-scrollbar { display: none; }
        .app-card { width: 120px; flex-shrink: 0; display: flex; flex-direction: column; scroll-snap-align: start; cursor: pointer; transition: transform 0.2s; }
        .app-card:active { transform: scale(0.95); }
        .app-icon { width: 120px; height: 120px; border-radius: 22px; object-fit: cover; box-shadow: var(--shadow-sm); margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); background: #fff; }
        .app-name { font-size: 14px; font-weight: 600; margin: 0 0 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-color); }
        .app-developer { font-size: 12px; color: var(--text-secondary); margin: 0 0 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-rating { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; font-weight: 500;}
        .app-rating i { font-size: 10px; color: #f39c12; }

        /* Featured Large Card */
        .featured-card { margin: 15px; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-lg); position: relative; background: var(--card-bg); cursor: pointer; }
        .featured-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .featured-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .featured-info-text { display: flex; gap: 12px; align-items: center; }
        .feat-small-icon { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; box-shadow: var(--shadow-sm); }
        .featured-title { font-size: 16px; font-weight: 700; margin:0 0 2px 0; }
        .featured-cat { font-size: 12px; color: var(--text-secondary); }
        .btn-featured-install { background: var(--accent-color); color: var(--primary-color); border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; font-size: 13px; cursor: pointer; }

        /* Admin Floating Button */
        #adminBtn { position: fixed; bottom: 80px; right: 20px; background: #e74c3c; color: white; width: 50px; height: 50px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; box-shadow: var(--shadow-lg); cursor: pointer; z-index: 1000; border: none; }

        /* Modals Global */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-color); width: 100%; max-height: 90vh; border-radius: 25px 25px 0 0; padding: 25px 20px; overflow-y: auto; position: relative; animation: slideUp 0.3s ease-out; box-sizing: border-box; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.05); border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* App Detail Modal */
        .detail-header { display: flex; gap: 20px; margin-bottom: 25px; align-items: center; }
        .detail-icon { width: 100px; height: 100px; border-radius: 20px; object-fit: cover; box-shadow: var(--shadow-sm); }
        .detail-title { font-size: 22px; font-weight: 700; margin: 0 0 5px 0; line-height: 1.2; }
        .detail-dev { color: var(--primary-color); font-size: 14px; font-weight: 600; margin: 0 0 10px 0; }
        .detail-stats { display: flex; gap: 20px; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 15px 0; margin-bottom: 20px; }
        .stat-box { text-align: center; border-right: 1px solid var(--border-color); padding-right: 20px; }
        .stat-box:last-child { border: none; }
        .stat-val { font-size: 16px; font-weight: 700; color: var(--text-color); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }
        .detail-desc { font-size: 14px; line-height: 1.6; color: var(--text-secondary); margin-bottom: 30px; }
        .install-full-btn { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(1, 135, 95, 0.3); }

        /* Admin Form Modal */
        .admin-form input, .admin-form textarea, .admin-form select { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 12px; font-family: inherit; font-size: 14px; box-sizing: border-box; background: var(--card-bg); outline: none; }
        .admin-form input:focus { border-color: var(--primary-color); }
        .admin-checkbox { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-weight: 600; font-size: 14px; }
        .admin-submit { width: 100%; background: #202124; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; }
        
        .admin-app-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--card-bg); border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .admin-app-list-item img { width: 40px; height: 40px; border-radius: 8px; }
        .admin-actions button { border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-edit { background: #f39c12; color: white; }
        .btn-delete { background: #e74c3c; color: white; }

        /* Loader */
        .loader { text-align: center; padding: 30px; color: var(--text-secondary); font-weight: bold; display: none; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; height: 60px; display: flex; justify-content: space-around; align-items: center; z-index: 1500; padding: 0 5px; box-sizing: border-box; border-radius: 35px; border: var(--glass-border); background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 15px 35px rgba(0,0,0,0.15); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-secondary); background: none; border: none; font-size: 9px; cursor: pointer; width: 50px; padding: 5px 0; transition: all 0.3s; }
        .nav-item i { font-size: 20px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item.active { color: var(--nav-primary); transform: translateY(-4px); font-weight: 600; }
        .nav-center-btn { background: var(--nav-gradient); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transform: translateY(-4px); box-shadow: 0 8px 20px rgba(24, 119, 242, 0.4); transition: transform 0.2s; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="app-header">
        <div class="header-left">
            <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
            <h1 class="store-title">মুক্তলিপি স্টোর</h1>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="userProfileImg" class="profile-icon">
    </div>

    <!-- Search -->
    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search" style="color:var(--text-secondary)"></i>
            <input type="text" id="searchInput" placeholder="অ্যাপ এবং গেম খুঁজুন" oninput="filterApps()">
        </div>
    </div>

    <div id="mainLoader" class="loader"><i class="fas fa-spinner fa-spin"></i> স্টোর লোড হচ্ছে...</div>

    <!-- Featured Section -->
    <div id="featuredContainer"></div>

    <!-- Recommended Section -->
    <div class="section-header">
        <h2 class="section-title">পছন্দের অ্যাপস <i class="fas fa-fire" style="color:#e74c3c; font-size:16px;"></i></h2>
    </div>
    <div class="app-list-horizontal" id="recommendedContainer">
        <!-- Apps injected here -->
    </div>

    <!-- Utility Section -->
    <div class="section-header">
        <h2 class="section-title">প্রয়োজনীয় টুলস <i class="fas fa-tools" style="color:#3498db; font-size:16px;"></i></h2>
    </div>
    <div class="app-list-horizontal" id="utilityContainer">
        <!-- Apps injected here -->
    </div>

    <!-- Admin Button -->
    <button id="adminBtn" onclick="openAdminPanel()"><i class="fas fa-cog"></i></button>

    <!-- App Detail Modal -->
    <div id="appDetailModal" class="modal-overlay" onclick="closeModal('appDetailModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal('appDetailModal')"><i class="fas fa-times"></i></button>
            
            <div class="detail-header">
                <img id="detIcon" src="" class="detail-icon">
                <div>
                    <h2 id="detName" class="detail-title">App Name</h2>
                    <p id="detDev" class="detail-dev">Developer</p>
                    <p class="app-rating" style="font-size:13px;">In-app purchases</p>
                </div>
            </div>

            <div class="detail-stats">
                <div class="stat-box">
                    <div id="detRating" class="stat-val">4.5 <i class="fas fa-star" style="font-size:12px;"></i></div>
                    <div class="stat-label">Rating</div>
                </div>
                <div class="stat-box">
                    <div id="detSize" class="stat-val">12 MB</div>
                    <div class="stat-label">Size</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val">10K+</div>
                    <div class="stat-label">Downloads</div>
                </div>
            </div>

            <button class="install-full-btn" id="detInstallBtn">ইনস্টল করুন</button>
            
            <h3 style="font-size: 16px; margin-top:20px;">অ্যাপ সম্পর্কে</h3>
            <div id="detDesc" class="detail-desc">Description goes here...</div>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="adminModal" class="modal-overlay" onclick="closeModal('adminModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal('adminModal')"><i class="fas fa-times"></i></button>
            <h2 style="margin-top:0;">অ্যাডমিন প্যানেল ⚙️</h2>
            
            <div class="admin-form">
                <input type="hidden" id="adminAppId">
                <input type="text" id="adminAppName" placeholder="অ্যাপের নাম">
                <input type="text" id="adminAppDev" placeholder="ডেভেলপারের নাম">
                <input type="text" id="adminAppIcon" placeholder="আইকনের ইমেজ লিংক (URL)">
                <input type="text" id="adminAppBanner" placeholder="ব্যানার ইমেজ লিংক (শুধু Featured এর জন্য)">
                <input type="text" id="adminAppSize" placeholder="ফাইলের সাইজ (যেমন: 12 MB)">
                <input type="text" id="adminAppRating" placeholder="রেটিং (যেমন: 4.5)">
                <input type="text" id="adminAppLink" placeholder="ডাউনলোড লিংক (Google Drive/Mediafire)">
                <select id="adminAppCat">
                    <option value="recommended">পছন্দের অ্যাপ (Recommended)</option>
                    <option value="utility">টুলস (Utility)</option>
                </select>
                <textarea id="adminAppDesc" rows="3" placeholder="অ্যাপের বর্ণনা"></textarea>
                
                <label class="admin-checkbox">
                    <input type="checkbox" id="adminAppFeatured"> এটি Featured (বড় ব্যানার) হিসেবে দেখান
                </label>

                <button class="admin-submit" onclick="saveApp()">সেভ করুন</button>
            </div>

            <h3 style="margin-top: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">সকল অ্যাপ তালিকা</h3>
            <div id="adminAppList">
                <!-- App List for edit/delete injected here -->
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='index.html'"><i class="fas fa-home"></i>হোম</button>
        <button class="nav-item" onclick="showNavToast('লাইব্রেরি শীঘ্রই আসছে...')"><i class="fas fa-book"></i>লাইব্রেরি</button>
        <button class="nav-center-btn" onclick="window.location.href='index.html'"><i class="fas fa-pen-nib"></i></button>
        <button class="nav-item active"><i class="fas fa-store"></i> অ্যাপ স্টোর</button>
        <button class="nav-item" onclick="window.location.href='index.html'"><i class="fas fa-user"></i>প্রোফাইল</button>
    </nav>

    <!-- Firebase SDK Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // আপনার Firebase Config (index.html থেকে নেওয়া)
        const firebaseConfig = {
            apiKey: "AIzaSyBZtycgadrngON2WEwvIE7ERPYxdkDVfFM",
            authDomain: "muktolipidiary.firebaseapp.com",
            databaseURL: "https://muktolipidiary-default-rtdb.firebaseio.com",
            projectId: "muktolipidiary",
            storageBucket: "muktolipidiary.firebasestorage.app",
            messagingSenderId: "639103995400",
            appId: "1:639103995400:web:13528e51c0e86080770bbd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const ADMIN_UID = "Pg5ko76Pu8Zf4ja9MMzEJRLDMYs1";

        window.allStoreApps = [];
        let isAdmin = false;

        // Auth Check
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userProfileImg').src = user.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                if (user.uid === ADMIN_UID) {
                    isAdmin = true;
                    document.getElementById('adminBtn').style.display = 'flex'; // Show Admin Gear
                }
            } else {
                Swal.fire({icon: 'warning', title: 'লগইন করুন', text: 'অ্যাপ স্টোর ব্যবহার করতে মূল অ্যাপ থেকে লগইন করুন।', confirmButtonText: 'ঠিক আছে'}).then(()=>{ window.location.href='index.html'; });
            }
        });

        // Load Apps from Database
        function loadApps() {
            document.getElementById('mainLoader').style.display = 'block';
            const appsRef = ref(db, 'store_apps');
            onValue(appsRef, (snapshot) => {
                document.getElementById('mainLoader').style.display = 'none';
                const data = snapshot.val();
                window.allStoreApps = [];
                if (data) {
                    window.allStoreApps = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                }
                renderApps();
                if(isAdmin) renderAdminAppList();
            });
        }
        loadApps();

        // Render UI
        window.renderApps = function(filteredApps = window.allStoreApps) {
            const featContainer = document.getElementById('featuredContainer');
            const recContainer = document.getElementById('recommendedContainer');
            const utiContainer = document.getElementById('utilityContainer');

            featContainer.innerHTML = ''; recContainer.innerHTML = ''; utiContainer.innerHTML = '';

            filteredApps.forEach(app => {
                // 1. Featured Check
                if(app.isFeatured) {
                    featContainer.innerHTML = `
                    <div class="featured-card" onclick="openAppDetails('${app.id}')">
                        <img src="${app.banner || app.icon}" class="featured-img" onerror="this.src='https://images.unsplash.com/photo-1614680376593-902f74cf0d41?auto=format&fit=crop&w=800&q=80'">
                        <div class="featured-info">
                            <div class="featured-info-text">
                                <img src="${app.icon}" class="feat-small-icon">
                                <div>
                                    <h3 class="featured-title">${app.name}</h3>
                                    <span class="featured-cat">${app.developer}</span>
                                </div>
                            </div>
                            <button class="btn-featured-install" onclick="event.stopPropagation(); installApp('${app.id}')">ইনস্টল</button>
                        </div>
                    </div>`;
                }

                // 2. Normal Cards
                const cardHTML = `
                <div class="app-card" onclick="openAppDetails('${app.id}')">
                    <img src="${app.icon}" class="app-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1041/1041916.png'">
                    <p class="app-name">${app.name}</p>
                    <p class="app-developer">${app.developer}</p>
                    <div class="app-rating">${app.rating} <i class="fas fa-star"></i> • ${app.size}</div>
                </div>`;

                if(app.category === 'recommended') recContainer.innerHTML += cardHTML;
                else utiContainer.innerHTML += cardHTML;
            });

            if(recContainer.innerHTML==='') recContainer.innerHTML = '<p style="color:#888; font-size:13px;">কোনো অ্যাপ নেই</p>';
            if(utiContainer.innerHTML==='') utiContainer.innerHTML = '<p style="color:#888; font-size:13px;">কোনো অ্যাপ নেই</p>';
        };

        // Search Filter
        window.filterApps = function() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = window.allStoreApps.filter(app => app.name.toLowerCase().includes(q) || app.developer.toLowerCase().includes(q));
            renderApps(filtered);
        };

        // Open Detail Modal
        window.openAppDetails = function(appId) {
            const app = window.allStoreApps.find(a => a.id === appId);
            if(!app) return;
            
            document.getElementById('detIcon').src = app.icon;
            document.getElementById('detName').innerText = app.name;
            document.getElementById('detDev').innerText = app.developer;
            document.getElementById('detRating').innerHTML = `${app.rating} <i class="fas fa-star" style="font-size:12px;"></i>`;
            document.getElementById('detSize').innerText = app.size;
            document.getElementById('detDesc').innerText = app.desc || "কোনো বর্ণনা দেওয়া নেই।";
            
            const installBtn = document.getElementById('detInstallBtn');
            installBtn.onclick = () => installApp(appId);

            document.getElementById('appDetailModal').style.display = 'flex';
        };

        // Install Action (Redirects to Admin's Link)
        window.installApp = function(appId) {
            const app = window.allStoreApps.find(a => a.id === appId);
            if(!app || !app.downloadLink) {
                return Swal.fire('দুঃখিত', 'এই অ্যাপটির ডাউনলোড লিংক দেওয়া নেই।', 'error');
            }
            
            Swal.fire({
                title: 'ডাউনলোড শুরু হচ্ছে...',
                text: `${app.name} ডাউনলোড করার জন্য আপনাকে রিডাইরেক্ট করা হচ্ছে।`,
                icon: 'info',
                timer: 2000,
                showConfirmButton: false,
                willClose: () => {
                    window.open(app.downloadLink, '_blank'); // Opens the download link
                }
            });
        };

        /* =========================================
           ADMIN CRUD OPERATIONS
           ========================================= */
        window.openAdminPanel = function() {
            document.getElementById('adminModal').style.display = 'flex';
            resetAdminForm();
        };

        window.closeModal = function(id) {
            document.getElementById(id).style.display = 'none';
        };

        window.saveApp = function() {
            const id = document.getElementById('adminAppId').value;
            const appData = {
                name: document.getElementById('adminAppName').value.trim(),
                developer: document.getElementById('adminAppDev').value.trim(),
                icon: document.getElementById('adminAppIcon').value.trim() || 'https://cdn-icons-png.flaticon.com/512/1041/1041916.png',
                banner: document.getElementById('adminAppBanner').value.trim(),
                size: document.getElementById('adminAppSize').value.trim() || '10 MB',
                rating: document.getElementById('adminAppRating').value.trim() || '4.5',
                downloadLink: document.getElementById('adminAppLink').value.trim(),
                category: document.getElementById('adminAppCat').value,
                desc: document.getElementById('adminAppDesc').value.trim(),
                isFeatured: document.getElementById('adminAppFeatured').checked,
                timestamp: Date.now()
            };

            if(!appData.name || !appData.downloadLink) return Swal.fire('সতর্কতা', 'অ্যাপের নাম এবং ডাউনলোড লিংক অবশ্যই দিতে হবে!', 'warning');

            Swal.fire({title: 'সেভ করা হচ্ছে...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});

            if (id) {
                // Update
                update(ref(db, `store_apps/${id}`), appData).then(() => {
                    Swal.fire('সফল!', 'অ্যাপ আপডেট হয়েছে।', 'success');
                    resetAdminForm();
                });
            } else {
                // Create New
                push(ref(db, 'store_apps'), appData).then(() => {
                    Swal.fire('সফল!', 'নতুন অ্যাপ যুক্ত হয়েছে।', 'success');
                    resetAdminForm();
                });
            }
        };

        window.renderAdminAppList = function() {
            const list = document.getElementById('adminAppList');
            list.innerHTML = window.allStoreApps.map(app => `
                <div class="admin-app-list-item">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${app.icon}">
                        <div>
                            <div style="font-weight:bold; font-size:14px;">${app.name} ${app.isFeatured ? '<span style="color:#e74c3c;font-size:10px;">(Featured)</span>' : ''}</div>
                            <div style="font-size:11px; color:#666;">${app.category}</div>
                        </div>
                    </div>
                    <div class="admin-actions">
                        <button class="btn-edit" onclick="editApp('${app.id}')"><i class="fas fa-pen"></i></button>
                        <button class="btn-delete" onclick="deleteApp('${app.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        };

        window.editApp = function(id) {
            const app = window.allStoreApps.find(a => a.id === id);
            if(!app) return;
            document.getElementById('adminAppId').value = app.id;
            document.getElementById('adminAppName').value = app.name;
            document.getElementById('adminAppDev').value = app.developer;
            document.getElementById('adminAppIcon').value = app.icon;
            document.getElementById('adminAppBanner').value = app.banner || '';
            document.getElementById('adminAppSize').value = app.size;
            document.getElementById('adminAppRating').value = app.rating;
            document.getElementById('adminAppLink').value = app.downloadLink;
            document.getElementById('adminAppCat').value = app.category;
            document.getElementById('adminAppDesc').value = app.desc;
            document.getElementById('adminAppFeatured').checked = app.isFeatured;
            
            // Scroll to top of modal
            document.querySelector('#adminModal .modal-content').scrollTop = 0;
        };

        window.deleteApp = function(id) {
            Swal.fire({
                title: 'ডিলিট করবেন?', text: "এই অ্যাপটি চিরতরে মুছে যাবে!", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#e74c3c', confirmButtonText: 'হ্যাঁ, মুছুন'
            }).then((result) => {
                if (result.isConfirmed) {
                    remove(ref(db, `store_apps/${id}`)).then(() => Swal.fire('মুছে গেছে!', 'অ্যাপটি ডিলিট করা হয়েছে।', 'success'));
                }
            });
        };

        function resetAdminForm() {
            document.getElementById('adminAppId').value = '';
            document.getElementById('adminAppName').value = '';
            document.getElementById('adminAppDev').value = '';
            document.getElementById('adminAppIcon').value = '';
            document.getElementById('adminAppBanner').value = '';
            document.getElementById('adminAppSize').value = '';
            document.getElementById('adminAppRating').value = '';
            document.getElementById('adminAppLink').value = '';
            document.getElementById('adminAppDesc').value = '';
            document.getElementById('adminAppFeatured').checked = false;
        }

        // Global Utility
        window.showNavToast = function(msg) {
            Swal.fire({text: msg, icon: 'info', toast: true, position: 'bottom', showConfirmButton: false, timer: 2000, background: '#333', color: '#fff'});
        };
    </script>
</body>
</html>
