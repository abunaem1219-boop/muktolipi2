<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #01875f; font-family: 'Hind Siliguri', sans-serif; color: white; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { margin: 0; font-size: 24px; font-weight: 600; }
        p { font-size: 14px; opacity: 0.8; margin-top: 10px; }
    </style>
</head>
<body>

    <div>
        <div class="spinner"></div>
        <h2>ডাউনলোড শুরু হচ্ছে...</h2>
        <p>দয়া করে অপেক্ষা করুন</p>
    </div>

    <script>
        setTimeout(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const rawUrl = urlParams.get('url');
            if (rawUrl) {
                window.location.replace(decodeURIComponent(rawUrl));
            } else {
                alert("Invalid Download Link");
                window.history.back();
            }
        }, 2000); // 2 Seconds wait
    </script>
</body>
</html>
